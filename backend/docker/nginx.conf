server {
    listen 80;

    server_name gotovirt.ru www.gotovirt.ru;

    root /usr/share/nginx/html;  # Указываем корневую директорию, где расположены файлы вашего приложения

    location / {
        try_files $uri $uri/ /index.html;  # Перенаправляем все запросы на файл index.html
    }

    location /api/ {
        proxy_pass http://92.255.110.144:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl;
    ssl_certificate server.crt;
    ssl_certificate_key server.key;
    ssl_trusted_certificate chain.crt;
}
