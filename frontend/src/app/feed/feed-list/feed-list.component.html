<div class="items">
  <app-feed-list-item page="feed" *ngFor="let item of (feed$ | async)" [value]="item"></app-feed-list-item>
</div>
<div
  infiniteScroll
  [infiniteScrollDistance]="scrollDistance"
  [infiniteScrollUpDistance]="scrollUpDistance"
  [infiniteScrollThrottle]="throttle"
  (scrolled)="onScroll()"
></div>
<app-background-for-switcher></app-background-for-switcher>
