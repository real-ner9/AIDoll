<div class="loader" *ngIf="loading$ | async">
  <div class="loader__spinner">
    <div class="loader__ring"></div>
  </div>
</div>
<div class="items" *ngIf="(matches$ | async)?.length">
  <app-match-list-item
    page="matches"
    *ngFor="let item of (matches$ | async)"
    [value]="item"
    (request)="onRequest($event)"
    (cancelRequest)="onCancelRequest($event)">
  </app-match-list-item>
</div>
<div class="empty-state" *ngIf="!(loading$ | async) && (matches$ | async)?.length === 0">
  <div class="empty-state__icon">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z" fill="#642EFF"/>
    </svg>
  </div>
  <span class="empty-state__title">Нет мэтчей</span>
  <span class="empty-state__text">Лайкай анкеты в ленте, чтобы найти пару</span>
</div>
<app-background-for-switcher></app-background-for-switcher>
